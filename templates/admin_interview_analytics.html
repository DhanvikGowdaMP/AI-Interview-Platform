<!DOCTYPE html>
<html>
<head>
    <title>Admin Interview Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-4">

<h2 class="text-primary mb-4">
    Platform Analytics
</h2>

<div class="row">

<div class="col-md-3">
<div class="card shadow text-center">
<div class="card-body">
<h3>{{ total_users }}</h3>
<p>Total Users</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center">
<div class="card-body">
<h3>{{ total_interviews }}</h3>
<p>Total Interviews</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center">
<div class="card-body">
<h3>{{ avg_score }}/10</h3>
<p>Average Score</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center">
<div class="card-body">
<h3>{{ best_score }}/10</h3>
<p>Best Score</p>
</div>
</div>
</div>

</div>

</div>

</body>
</html>
