<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="text-primary">
                Edit User
            </h2>

            <hr>

            <p>
                <strong>Name:</strong>
                {{ user[1] }}
            </p>

            <p>
                <strong>Email:</strong>
                {{ user[2] }}
            </p>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Phone Number
                    </label>

                    <input
                        type="text"
                        name="phone"
                        value="{{ user[3] }}"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        LinkedIn
                    </label>

                    <input
                        type="text"
                        name="linkedin"
                        value="{{ user[4] }}"
                        class="form-control">

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Update User

                </button>

                <a href="/admin/users"
                   class="btn btn-secondary">

                   Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
