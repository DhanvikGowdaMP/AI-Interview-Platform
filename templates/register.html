<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center text-success mb-4">
                        User Registration
                    </h2>
                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required>

                        </div>
                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                               type="email"
                               name="email"
                               class="form-control"
                               required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input
                               type="text"
                               name="phone"
                               class="form-control"
                               required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                LinkedIn Profile
                            </label>

                            <input
                                type="url"
                                name="linkedin"
                                class="form-control"
                                placeholder="https://linkedin.com/in/username">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-success">

                                Register

                            </button>

                        </div>

                    </form>

                    <hr>

                    <div class="text-center">

                        <a href="/" class="btn btn-secondary">
                            Home
                        </a>

                        <a href="/login" class="btn btn-primary">
                            Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
