<!DOCTYPE html>
<html>
<head>
    <title>Add User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="text-success">
                ➕ Add New User
            </h2>

            <hr>

            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text"
                           name="phone"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>LinkedIn</label>
                    <input type="text"
                           name="linkedin"
                           class="form-control">
                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Create User

                </button>

                <a href="/admin/dashboard"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
