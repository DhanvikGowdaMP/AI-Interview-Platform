<!DOCTYPE html>
<html>
<head>
    <title>Registered Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-4">

    <h2 class="text-primary mb-4">
        Registered Users
    </h2>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-bordered table-striped table-hover">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Registered On</th>
                        <th>View Profile</th>
                        <th>Edit</th>
                        <th>Reset Password</th>
                        <th>Delete</th>
                    </tr>
                </thead>

                <tbody>

                {% for user in users %}

                    <tr>
                        <td>{{ user[0] }}</td>
                        <td>{{ user[1] }}</td>
                        <td>{{ user[2] }}</td>
                        <td>{{ user[3] }}</td>

                        

                        <td>
                            <a href="/admin/user_profile/{{ user[0] }}"
                               class="btn btn-info btn-sm">
                                View
                            </a>
                        </td>

                        <td>
                            <a href="/admin/edit_user/{{ user[0] }}"
                               class="btn btn-primary btn-sm">
                                Edit
                            </a>
                        </td>

                        <td>
                            <a href="/admin/reset_password/{{ user[0] }}"
                                class="btn btn-warning btn-sm">
                                 🔑 Reset Password
                            </a>
                        </td>


                        <td>
                            <a href="/admin/delete_user/{{ user[0] }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure you want to delete this user?')">
                                Delete
                            </a>
                        </td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

            <div class="mt-4">

                <a href="/admin/dashboard" class="btn btn-primary">
                    Admin Dashboard
                </a>

                <a href="/profile" class="btn btn-success">
                    Profile
                </a>

                <a href="/admin/analysis" class="btn btn-warning">
                    Resume Analyses
                </a>

                <a href="/logout" class="btn btn-danger">
                    Logout
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
