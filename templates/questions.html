<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Questions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="text-primary mb-4">
                AI Generated Interview Questions
            </h2>

            <form method="POST" action="/submit_answers">

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        Interview Questions
                    </label>

                    <textarea
                        class="form-control"
                        rows="10"
                        readonly>{{ questions }}</textarea>

                </div>

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        Your Answers
                    </label>

                    <textarea
                        name="answers"
                        class="form-control"
                        rows="12"
                        placeholder="Type your answers here..."
                        required></textarea>

                </div>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-success">

                        🎤 Submit Answers

                    </button>

                    <a href="/dashboard"
                       class="btn btn-primary">

                        Dashboard

                    </a>

                    <a href="/history"
                       class="btn btn-info">

                        History

                    </a>

                    <a href="/profile"
                       class="btn btn-warning">

                        Profile

                    </a>

                    <a href="/logout"
                       class="btn btn-danger">

                        Logout

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
