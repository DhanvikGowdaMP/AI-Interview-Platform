<!DOCTYPE html>
<html>
<head>
    <title>Interview Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-4">

    <h2 class="text-primary">
        Interview Analytics
    </h2>

    <div class="card shadow mt-3">

        <div class="card-body">

            <h4>Total Interviews: {{ total }}</h4>

            <h4>Best Score: {{ best }}/10</h4>

            <h4>Average Score: {{ average }}/10</h4>

            <h4>Latest Score: {{ latest }}/10</h4>

        </div>

    </div>

</div>

</body>
</html>
