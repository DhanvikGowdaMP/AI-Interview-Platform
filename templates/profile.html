<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  {% include 'navbar.html' %}  

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h1 class="text-primary mb-4">
                My Profile
            </h1>

            <div class="text-center mb-4">
                <h3>{{ user[0] }}</h3>
                <p class="text-muted">{{ email }}</p>
            </div>

            <hr>

            <div class="row text-center">

                <div class="col-md-6">
                    <h5>Name</h5>
                    <p>{{ user[0] }}</p>
                </div>

                <div class="col-md-6">
                    <h5>Email</h5>
                    <p>{{ user[1] }}</p>
                </div>
                <hr>

<div class="row text-center">

    <div class="col-md-6">

        <h5>📱 Phone Number</h5>

        <p>{{ user[2] }}</p>

    </div>

    <div class="col-md-6">

        <h5>🔗 LinkedIn</h5>

        <p>
            <a href="{{ user[3] }}" target="_blank">
                View Profile
            </a>
        </p>

    </div>

</div>

            </div>

            <hr>

            <div class="text-center">

                <a href="/dashboard" class="btn btn-primary">
                    Dashboard
                </a>

                <a href="/history" class="btn btn-info">
                    History
                </a>

                <a href="/upload_resume" class="btn btn-success">
                    Upload Resume
                </a>

                <a href="/logout" class="btn btn-danger">
                    Logout
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
