<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Admin Dashboard
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-center shadow border-0">
                <div class="card-body">
                    <h5>Total Users</h5>
                    <h1 class="text-primary">
                        {{ total_users }}
                    </h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow border-0">
                <div class="card-body">
                    <h5>Resume Uploads</h5>
                    <h1 class="text-success">
                        {{ total_uploads }}
                    </h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow border-0">
                <div class="card-body">
                    <h5>Total Admins</h5>
                    <h1 class="text-danger">
                        {{ total_admins }}
                    </h1>
                </div>
            </div>
        </div>

    </div>

</div>

<hr class="mt-5">

<div class="card shadow mt-4">
    <div class="card-body">

    <h3 class="mb-4">
        Admin Actions
    </h3>

    <div class="d-flex flex-wrap gap-2 mb-4">

        <a href="/admin/users" class="btn btn-dark">
            👥 View Users
        </a>

        

        <a href="/admin/analysis" class="btn btn-warning">
            📄 View Analysis
        </a>
        <a href="/admin/interview_reports"
            class="btn btn-info">
            Interview Reports
        </a>
        <a href="/admin/interview_analytics"
   class="btn btn-dark">
   Platform Analytics
</a>

        <a href="/admin/add_user" class="btn btn-success">
            ➕ Add User
        </a>

        <a href="/admin/make_admin" class="btn btn-success">
            ➕ Make Admin
        </a>

        <a href="/admin/remove_admin" class="btn btn-danger">
            ➖ Remove Admin
        </a>

    </div>

    <div class="d-flex flex-wrap gap-2">

        <a href="/dashboard" class="btn btn-primary">
            Dashboard
        </a>

        <a href="/profile" class="btn btn-success">
            Profile
        </a>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>

</div>

</body>
</html>
